{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2 class="mb-4">👤 Nuevo Contacto</h2>

    <div class="card p-4 shadow-sm" style="max-width: 420px;">
        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nombre del contacto</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-dark w-100">Crear Contacto</button>
        </form>
    </div>
</div>

{% endblock %}
