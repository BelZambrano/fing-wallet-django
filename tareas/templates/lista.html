{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Transacciones</h2>

<form method="get" class="d-flex mb-4">
    <input type="text" name="q" class="form-control me-2" placeholder="Buscar usuario" value="{{ request.GET.q }}">
    <button class="btn btn-primary">Buscar</button>
</form>

<a href="/crear/" class="btn btn-success mb-4">+ Nueva Transacción</a>

<ul class="list-group">
{% for t in transacciones %}
    <li class="list-group-item d-flex justify-content-between">
        <div>
            <strong>{{ t.usuario.nombre }}</strong><br>
            ${{ t.monto }}
        </div>

        <div>
            <a href="/editar/{{ t.id }}" class="btn btn-warning btn-sm">Editar</a>
            <a href="/eliminar/{{ t.id }}" class="btn btn-danger btn-sm">Eliminar</a>
        </div>
    </li>
{% endfor %}
</ul>

{% endblock %}
