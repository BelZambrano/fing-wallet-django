{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Transacciones</h2>

<form method="get" class="d-flex mb-4">
    <input type="text" name="q" class="form-control me-2" placeholder="Buscar usuario" value="{{ request.GET.q }}">
    <button class="btn btn-primary">Buscar</button>
</form>

<div class="mb-3">
    <a href="/crear/" class="btn btn-success">+ Nueva Transacción</a>
    <a href="/crear-usuario/" class="btn btn-primary">+ Nuevo Usuario</a>
</div>

<div class="row">
{% for t in transacciones %}
    <div class="col-md-6 mb-4">

        <div class="card shadow-sm border-0 p-4">

            <h5 class="fw-bold mb-1">{{ t.usuario.nombre }}</h5>

            <!-- 💰 SIN DECIMALES -->
            <p class="text-muted mb-2">${{ t.monto|floatformat:0 }}</p>

            {% if t.tipo == "ingreso" %}
                <span class="badge rounded-pill bg-success-subtle text-success mb-3">Ingreso</span>
            {% else %}
                <span class="badge rounded-pill bg-danger-subtle text-danger mb-3">Gasto</span>
            {% endif %}

            <div class="d-flex gap-2">
                <a href="/editar/{{ t.id }}" class="btn btn-outline-secondary btn-sm w-100">Editar</a>
                <a href="/eliminar/{{ t.id }}" class="btn btn-outline-danger btn-sm w-100">Eliminar</a>
            </div>

        </div>

    </div>
{% endfor %}
</div>

{% endblock %}
